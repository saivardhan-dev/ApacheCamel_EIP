# ??? ActiveMQ ??????????????????????????????????????????????????????????????????
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin

# ??? Camel ?????????????????????????????????????????????????????????????????????
camel.springboot.main-run-controller=true
camel.springboot.name=MiniIntegrationPlatform

# ??? Common Queue Names ?????????????????????????????????????????????????????????
app.queue.core-entry=CORE.ENTRY.SERVICE.IN
app.queue.audit=COMMON.AUDIT.SERVICE.IN
app.queue.exception=COMMON.EXCEPTION.SERVICE.IN

# ??? MongoDB ????????????????????????????????????????????????????????????????????
spring.data.mongodb.uri=mongodb://localhost:27017/mini_integration_platform
spring.data.mongodb.database=mini_integration_platform

# Collection names
app.mongodb.collection.audit=audits
app.mongodb.collection.exception=exceptions

# ??? Grok AI (Free Tier ? no credit card required) ???????????????????????????
# Get your free key at: console.groq.com ? API Keys ? Create API Key
groq.api.key=Enter Free Grok API Key Here
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile
groq.api.max-tokens=1024

# ??? Email Notifications (SMTP) ?????????????????????????????????????????????
# Works with Gmail, Outlook, SendGrid SMTP relay, or any SMTP provider
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=your from mail@gmail.com
spring.mail.password=16 character App Password Here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

notification.from.email=your from mail@gmail.com
notification.from.name=Mini Integration Platform
notification.to.email=your to mail@gmail.com
